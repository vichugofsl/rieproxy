# GoReleaser config — https://goreleaser.com
# Dry run locally with: goreleaser release --snapshot --clean
version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: rieproxy
    main: ./cmd/rieproxy
    binary: rieproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
